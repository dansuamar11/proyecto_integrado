services:
  mysql:
    image: mysql:8.4
    container_name: basket-aljarafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-BASKETALJARAFE}
      MYSQL_USER: ${MYSQL_USER:-basket_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-basket_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basket-aljarafe-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 1000
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-BASKETALJARAFE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TZ:-Europe/Madrid}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-basket_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-basket_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - "${BACKEND_PORT:-1001}:1000"

  frontend:
    build:
      context: ./frontend/basketAljarafe
      dockerfile: Dockerfile
    container_name: basket-aljarafe-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
