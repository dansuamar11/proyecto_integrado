<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card page-card">
      <div class="card-body p-4">
        <h1 class="h3 section-title mb-3">Acceso a la plataforma</h1>
        <p class="text-secondary mb-4">Introduce tus credenciales para acceder al panel correspondiente.</p>

        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

        <form [formGroup]="formularioLogin" (ngSubmit)="iniciarSesion()" class="d-grid gap-3">
          <div>
            <label class="form-label" for="username">Usuario</label>
            <input id="username" type="text" class="form-control" formControlName="username">
          </div>

          <div>
            <label class="form-label" for="password">Contraseña</label>
            <input id="password" type="password" class="form-control" formControlName="password">
          </div>

          <button type="submit" class="btn app-btn-primary" [disabled]="enviando">
            {{ enviando ? 'Accediendo...' : 'Entrar' }}
          </button>
        </form>

        <hr class="my-4">
        <!-- <p class="mb-2 fw-semibold">Usuarios de prueba</p>
        <p class="small text-secondary mb-0">
          admin/admin123, gerente/gerente123, arbitro1/arbitro123, entrenador1/entrenador123
        </p> -->
      </div>
    </div>
  </div>
</div>
