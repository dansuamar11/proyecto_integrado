<div class="card page-card">
  <div class="card-body p-4">
    <h1 class="h3 section-title mb-3">Contacto e inscripción</h1>
    <p class="text-secondary mb-4">Formulario de contacto para resolver dudas o solicitar alta en la competición.</p>

    <div class="alert alert-success" *ngIf="mensajeExito">{{ mensajeExito }}</div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <!-- Directiva que sirve para asociar el formulario HTML con el modelo reactivo de Angular. -->
    <form [formGroup]="formularioContacto" (ngSubmit)="enviarFormulario()" class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="nombreContacto">Nombre de contacto</label>
        <input id="nombreContacto" type="text" class="form-control" formControlName="nombreContacto">
      </div>

      <div class="col-md-6">
        <label class="form-label" for="correoContacto">Correo electrónico</label>
        <input
          id="correoContacto"
          type="email"
          class="form-control"
          [class.is-invalid]="mostrarErrorCampo('correoContacto') || mostrarErrorContactoMinimo()"
          formControlName="correoContacto">
        <div class="invalid-feedback" *ngIf="formularioContacto.get('correoContacto')?.hasError('email')">
          Introduce un correo electrónico válido.
        </div>
        <div class="invalid-feedback" *ngIf="!formularioContacto.get('correoContacto')?.hasError('email') && mostrarErrorContactoMinimo()">
          Debes indicar al menos un correo o un teléfono.
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label" for="telefonoContacto">Teléfono</label>
        <input
          id="telefonoContacto"
          type="text"
          class="form-control"
          [class.is-invalid]="mostrarErrorContactoMinimo()"
          formControlName="telefonoContacto">
        <div class="invalid-feedback">Debes indicar al menos un correo o un teléfono.</div>
      </div>

      <div class="col-12">
        <label class="form-label" for="mensaje">Mensaje</label>
        <textarea
          id="mensaje"
          rows="5"
          class="form-control"
          [class.is-invalid]="mostrarErrorCampo('mensaje')"
          formControlName="mensaje"></textarea>
        <div class="invalid-feedback">El mensaje es obligatorio.</div>
      </div>

      <div class="col-12">
        <button type="submit" class="btn app-btn-primary" [disabled]="enviando">
          {{ enviando ? 'Enviando...' : 'Enviar solicitud' }}
        </button>
      </div>
    </form>
  </div>
</div>
